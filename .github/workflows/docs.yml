name: Deploy Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-0.13.1-${{ runner.os }}

      - name: Build playground WASM
        run: |
          if ! command -v wasm-pack &>/dev/null; then
            cargo install wasm-pack --version 0.13.1 --locked
          fi
          wasm-pack build crates/wasm --target web --release --out-dir pkg-web
          mkdir -p docs/static/playground_wasm
          cp crates/wasm/pkg-web/mago_wasm.js \
             crates/wasm/pkg-web/mago_wasm_bg.wasm \
             crates/wasm/pkg-web/mago_wasm.d.ts \
             crates/wasm/pkg-web/mago_wasm_bg.wasm.d.ts \
             crates/wasm/pkg-web/package.json \
             docs/static/playground_wasm/

      - name: Install documentation Node dependencies
        run: npm install --prefix docs

      - name: Determine documentation version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=main" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build static documentation
        env:
          MAGO_DOCS_VERSION: ${{ steps.version.outputs.value }}
        run: |
          cargo run -p mago-documentation

      - name: Check out gh-pages worktree
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          else
            git worktree add --detach gh-pages-worktree
            git -C gh-pages-worktree checkout --orphan gh-pages
            git -C gh-pages-worktree rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Stage gh-pages worktree
        run: php scripts/publish-docs.php "${{ steps.version.outputs.value }}" docs gh-pages-worktree

      - name: Commit and push gh-pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: gh-pages-worktree
          branch: gh-pages
          commit_message: "Deploy docs (${{ steps.version.outputs.value }})"

      - name: Clean up worktree
        if: always()
        run: git worktree remove gh-pages-worktree --force || true
