name: Miri

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 3 * * *"
  workflow_dispatch:

concurrency:
  group: miri-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr:
    name: Miri (parser core)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri, rust-src

      - name: cache rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: miri-nightly
          cache-on-failure: true

      - name: miri setup
        run: cargo +nightly miri setup

      - name: miri test (parser core)
        run: |
          cargo +nightly miri test \
            -p mago-syntax \
            -p mago-twig-syntax

  nightly:
    name: Miri (full suites)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri, rust-src

      - name: cache rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: miri-nightly
          cache-on-failure: true

      - name: miri setup
        run: cargo +nightly miri setup

      - name: miri test (linter, full)
        run: cargo +nightly miri test -p mago-linter

      - name: miri test (formatter, class-formatting slice)
        run: cargo +nightly miri test -p mago-formatter class_

      - name: miri test (analyzer, generics lib unit tests)
        run: cargo +nightly miri test -p mago-analyzer --lib -- template var
