name: Update Sponsors
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-sponsors-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Update sponsors in docs
        run: php scripts/update-sponsors-docs.php

      - name: Commit signed updates via GitHub GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          additions='[]'
          changed_paths=()
          for path in README.md SPONSORS.md docs/sponsors.json; do
            if [ ! -f "$path" ]; then
              continue
            fi

            new_b64=$(base64 < "$path" | tr -d '\n')

            remote_b64=$(gh api "repos/${GH_REPO}/contents/${path}?ref=${BRANCH}" --jq '.content' 2>/dev/null | tr -d '\n ' || echo "")
            if [ "$remote_b64" = "$new_b64" ]; then
              echo "No changes in ${path}."
              continue
            fi

            additions=$(jq --arg path "$path" --arg contents "$new_b64" \
              '. + [{path: $path, contents: $contents}]' <<<"$additions")
            changed_paths+=("$path")
          done

          if [ ${#changed_paths[@]} -eq 0 ]; then
            echo "Nothing to publish."
            exit 0
          fi

          head_oid=$(gh api "repos/${GH_REPO}/branches/${BRANCH}" --jq '.commit.sha')

          request=$(jq -n \
            --arg repo "$GH_REPO" \
            --arg branch "$BRANCH" \
            --arg headline "chore(sponsors): update sponsors list" \
            --arg oid "$head_oid" \
            --argjson additions "$additions" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url } } }",
              variables: {
                input: {
                  branch: {repositoryNameWithOwner: $repo, branchName: $branch},
                  message: {headline: $headline},
                  expectedHeadOid: $oid,
                  fileChanges: {additions: $additions}
                }
              }
            }')

          echo "Pushing one signed commit covering: ${changed_paths[*]}"
          printf '%s' "$request" | gh api graphql --input - >/dev/null
