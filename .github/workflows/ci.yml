name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]
        exclude:
          - { os: windows-latest, rust: nightly }
          - { os: macos-latest, rust: nightly }

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: resolve toolchain version
        id: toolchain
        shell: bash
        run: |
          if [ "${{ matrix.rust }}" = "nightly" ]; then
            echo "version=$(cat nightly-version)" >> $GITHUB_OUTPUT
          else
            echo "version=${{ matrix.rust }}" >> $GITHUB_OUTPUT
          fi

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.version }}
          components: rustfmt, clippy

      - name: cache rust toolchain
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-rust-${{ steps.toolchain.outputs.version }}
          shared-key: ${{ runner.os }}-rust-${{ steps.toolchain.outputs.version }}
          cache-on-failure: true

      - name: cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.toolchain.outputs.version }}-

      - name: cargo check
        if: matrix.os == 'macos-latest'
        run: cargo check --workspace --locked

      - name: cargo fmt
        if: matrix.os == 'macos-latest'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: cargo test (property)
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: cargo test -p mago-codex --features property-tests --locked

      - name: cargo build
        if: matrix.rust == 'stable'
        run: cargo build --release --locked

      - name: Install PHP
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        uses: shivammathur/setup-php@master
        with:
          php-version: "8.3"
          tools: "composer:v2"

      - name: Install composer dependencies
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: composer install

      - name: Validate composer code format
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: ./target/release/mago format --dry-run

      - name: Lint composer code
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: ./target/release/mago lint --reporting-format=github

      - name: Analyze composer code
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: ./target/release/mago analyze --reporting-format=github

  typos-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Search for misspellings
        uses: crate-ci/typos@master
