rules_category_BestPractices_name = "Best practices"
rules_category_BestPractices_blurb = "Idiomatic PHP patterns and widely-accepted conventions. These rules nudge code toward the way modern PHP is written by people who've shipped a lot of it."
rules_category_Clarity_name = "Clarity"
rules_category_Clarity_blurb = "Rules that make intent explicit and reduce reader effort. They flag patterns that are technically valid but obscure what the code is doing."
rules_category_Consistency_name = "Consistency"
rules_category_Consistency_blurb = "Stylistic uniformity across a codebase. Pick one way to do a thing, these rules help everyone stick to it."
rules_category_Correctness_name = "Correctness"
rules_category_Correctness_blurb = "Bugs and logic errors. Rules in this category catch code that does something the author probably did not intend."
rules_category_Deprecation_name = "Deprecation"
rules_category_Deprecation_blurb = "PHP features and APIs that have been deprecated upstream and will eventually be removed. Migrate before they break."
rules_category_Maintainability_name = "Maintainability"
rules_category_Maintainability_blurb = "Code that is hard to keep alive over time, too complex, too tangled, too fragile. These rules surface the cost early."
rules_category_Redundancy_name = "Redundancy"
rules_category_Redundancy_blurb = "Dead code, unused values, and constructs that have no observable effect. Trimming them keeps the codebase honest."
rules_category_Safety_name = "Safety"
rules_category_Safety_blurb = "Patterns that compile but blow up at runtime. These rules catch the foot-guns before users do."
rules_category_Security_name = "Security"
rules_category_Security_blurb = "Rules that flag security vulnerabilities, injection vectors, unsafe deserialisation, untrusted input flowing into dangerous sinks."

