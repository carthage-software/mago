rules_category_BestPractices_name = "Bonnes pratiques"
rules_category_BestPractices_blurb = "Patterns idiomatiques et conventions largement adoptées. Ces règles orientent le code vers la manière dont le PHP moderne est écrit par celles et ceux qui en livrent beaucoup."
rules_category_Clarity_name = "Clarté"
rules_category_Clarity_blurb = "Règles qui rendent l'intention explicite et réduisent l'effort de lecture. Elles signalent des constructions techniquement valides mais qui obscurcissent ce que fait le code."
rules_category_Consistency_name = "Cohérence"
rules_category_Consistency_blurb = "Uniformité stylistique sur l'ensemble du code. Choisissez une façon de faire, ces règles aident tout le monde à s'y tenir."
rules_category_Correctness_name = "Correction"
rules_category_Correctness_blurb = "Bugs et erreurs de logique. Les règles de cette catégorie attrapent du code qui fait probablement autre chose que ce que l'auteur voulait."
rules_category_Deprecation_name = "Obsolescence"
rules_category_Deprecation_blurb = "Fonctionnalités et API PHP marquées comme obsolètes en amont, et qui finiront par être supprimées. Migrez avant qu'elles ne cassent."
rules_category_Maintainability_name = "Maintenabilité"
rules_category_Maintainability_blurb = "Du code difficile à maintenir dans la durée, trop complexe, trop emmêlé, trop fragile. Ces règles font remonter le coût tôt."
rules_category_Redundancy_name = "Redondance"
rules_category_Redundancy_blurb = "Code mort, valeurs inutilisées, constructions sans effet observable. Les retirer garde le code honnête."
rules_category_Safety_name = "Sûreté"
rules_category_Safety_blurb = "Constructions qui compilent mais explosent à l'exécution. Ces règles attrapent les pièges avant les utilisateurs."
rules_category_Security_name = "Sécurité"
rules_category_Security_blurb = "Règles qui signalent des vulnérabilités, vecteurs d'injection, désérialisation non sûre, données non fiables atteignant des points dangereux."

