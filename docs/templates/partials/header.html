<header class="site-header">
  <div class="header-start">
    <a class="brand" href="{{ path_to_root }}{{ current_version }}/{{ lang_code }}/">
      <img class="brand__mark" src="{{ path_to_root }}{{ current_version }}/_assets/img/favicon-32x32.png" alt="" width="22" height="22">
      <span class="brand__name">{{ site_name }}</span>
      <span class="brand__divider">/</span>
      <span class="brand__tag">PHP toolchain</span>
    </a>
  </div>

  <div class="header-center">
    <button id="search-trigger" class="search-trigger" type="button" title="{{ ui.search }}" aria-label="{{ ui.search }}">
      <svg class="search-trigger__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
        <circle cx="7" cy="7" r="4.5"/>
        <path d="M10.5 10.5 14 14"/>
      </svg>
      <span class="search-trigger__hint">{{ ui.search_hint }}</span>
    </button>
  </div>

  <div class="header-end">
    <nav class="header-nav" aria-label="Primary">
      <a class="header-link" href="{{ path_to_root }}{{ current_version }}/{{ lang_code }}/guide/getting-started">{{ ui.nav_guide }}</a>
      <a class="header-link" href="{{ path_to_root }}{{ current_version }}/{{ lang_code }}/faq">{{ ui.nav_faq }}</a>
      <a class="header-link" href="{{ path_to_root }}{{ current_version }}/{{ lang_code }}/playground">{{ ui.playground_title }}</a>
      <a class="header-link" href="https://github.com/sponsors/azjezz" target="_blank" rel="noopener">{{ ui.nav_sponsor }}</a>
      <a class="header-icon" href="https://github.com/carthage-software/mago" target="_blank" rel="noopener" aria-label="{{ ui.nav_github }}" title="{{ ui.nav_github }}">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" width="16" height="16">
          <path d="M8 .2a8 8 0 0 0-2.5 15.6c.4.07.55-.18.55-.4v-1.4c-2.22.48-2.7-1.07-2.7-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.06-.49.06-.49.8.06 1.23.83 1.23.83.72 1.23 1.88.88 2.34.67.07-.52.28-.88.5-1.08-1.78-.2-3.64-.89-3.64-3.96 0-.87.31-1.59.83-2.15-.08-.2-.36-1.02.08-2.13 0 0 .67-.22 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.11.16 1.93.08 2.13.52.56.83 1.28.83 2.15 0 3.08-1.87 3.76-3.65 3.96.29.25.55.74.55 1.5v2.22c0 .22.15.48.55.4A8 8 0 0 0 8 .2"/>
        </svg>
      </a>
      <a class="header-icon" href="https://discord.gg/mwyyjr27eu" target="_blank" rel="noopener" aria-label="{{ ui.nav_discord }}" title="{{ ui.nav_discord }}">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" width="16" height="16">
          <path d="M13.55 2.92A12.4 12.4 0 0 0 10.42 2c-.13.24-.29.55-.4.81a11.5 11.5 0 0 0-3.42 0A8 8 0 0 0 6.18 2c-1.08.18-2.13.5-3.13.92C1.07 5.85.55 8.7.81 11.51a12.5 12.5 0 0 0 3.84 1.94c.31-.42.58-.86.81-1.32a8 8 0 0 1-1.27-.61l.31-.24a8.95 8.95 0 0 0 7.6 0l.31.24c-.4.24-.83.45-1.27.61.23.46.5.9.81 1.32a12.4 12.4 0 0 0 3.84-1.94c.31-3.27-.51-6.1-2.24-8.59M5.74 9.78c-.74 0-1.36-.69-1.36-1.54s.6-1.55 1.36-1.55c.76 0 1.37.7 1.36 1.55 0 .85-.6 1.54-1.36 1.54m5.02 0c-.74 0-1.36-.69-1.36-1.54s.6-1.55 1.36-1.55c.76 0 1.37.7 1.36 1.55 0 .85-.6 1.54-1.36 1.54"/>
        </svg>
      </a>
    </nav>
    {% include "partials/version-select.html" %}
    {% include "partials/lang-select.html" %}
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="{{ ui.theme_toggle }}">
      <svg class="icon-moon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M11 8.5A4.5 4.5 0 0 1 5.5 3a5 5 0 1 0 5.5 5.5z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="7" cy="7" r="2.6"/>
        <path d="M7 1v1.6M7 11.4V13M1 7h1.6M11.4 7H13M2.5 2.5l1.1 1.1M10.4 10.4l1.1 1.1M2.5 11.5l1.1-1.1M10.4 3.6l1.1-1.1"/>
      </svg>
    </button>
  </div>
</header>
